openapi: 3.0.1
info:
  title: sync
  description: ""
  version: 0.0.1
servers:
- url: ""
tags: []
paths:
  /auth/login:
    post:
      tags:
      - auth
      summary: Login
      description: Login
      operationId: Login
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            examples:
              Login:
                value: "{\"email\":\"user@example.com\",\"password\":\"password123\"\
                  }"
      responses:
        "204":
          description: "204"
  /auth/logout:
    post:
      tags:
      - auth
      summary: Logout
      description: Logout
      operationId: Logout
      responses:
        "204":
          description: "204"
  /auth/register:
    post:
      tags:
      - auth
      summary: Register
      description: Register
      operationId: Register
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
            examples:
              Register:
                value: "{\"email\":\"newuser@example.com\",\"password\":\"password123\"\
                  }"
      responses:
        "204":
          description: "204"
  /bookmarks/posts:
    get:
      tags:
      - bookmark
      summary: Get Bookmarked Posts
      description: Get Bookmarked Posts
      operationId: GetBookmarkedPosts
      parameters:
      - name: first
        in: query
        description: Number of items to return from the beginning of the list
        required: false
        schema:
          type: string
      - name: after
        in: query
        description: "Cursor for pagination, indicating the position after which to\
          \ return items"
        required: false
        schema:
          type: string
      - name: last
        in: query
        description: Number of items to return from the end of the list
        required: false
        schema:
          type: string
      - name: before
        in: query
        description: "Cursor for pagination, indicating the position before which\
          \ to return items"
        required: false
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetBookmarkedPostsResponse"
              examples:
                GetBookmarkedPosts:
                  value: "{\"posts\":{\"pageInfo\":{\"size\":1,\"hasNextPage\":false,\"\
                    hasPreviousPage\":false,\"startCursor\":\"start-cursor\",\"endCursor\"\
                    :\"end-cursor\"},\"nodes\":[{\"cursor\":\"cursor\",\"content\"\
                    :{\"id\":1,\"slug\":\"test-slug\",\"author\":{\"id\":1,\"handle\"\
                    :\"user_handle\",\"name\":\"User Name\",\"profileImageUrl\":\"\
                    https://example.com/profile.jpg\"},\"content\":\"This is a bookmarked\
                    \ post content\",\"likeCount\":10,\"commentCount\":5,\"bookmarked\"\
                    :true,\"createdAt\":\"2026-05-04T12:00:00\",\"bookmarkedAt\":\"\
                    2026-05-05T12:00:00\"}}]}}"
  /comments/{commentId}:
    delete:
      tags:
      - comment
      summary: Delete Comment
      description: Delete Comment
      operationId: DeleteComment
      parameters:
      - name: commentId
        in: path
        description: Comment ID
        required: true
        schema:
          type: string
      responses:
        "204":
          description: "204"
    patch:
      tags:
      - comment
      summary: Update Comment
      description: Update Comment
      operationId: UpdateComment
      parameters:
      - name: commentId
        in: path
        description: Comment ID
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCommentRequest"
            examples:
              UpdateComment:
                value: "{\"content\":\"Updated comment content\"}"
      responses:
        "204":
          description: "204"
  /feed/recent:
    get:
      tags:
      - feed
      summary: Get Recent Feed
      description: Get Recent Feed
      operationId: GetRecentFeed
      parameters:
      - name: first
        in: query
        description: Number of items to return from the beginning of the list
        required: false
        schema:
          type: string
      - name: after
        in: query
        description: "Cursor for pagination, indicating the position after which to\
          \ return items"
        required: false
        schema:
          type: string
      - name: last
        in: query
        description: Number of items to return from the end of the list
        required: false
        schema:
          type: string
      - name: before
        in: query
        description: "Cursor for pagination, indicating the position before which\
          \ to return items"
        required: false
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetFeedResponse"
              examples:
                GetRecentFeed:
                  value: |-
                    {
                      "items" : {
                        "pageInfo" : {
                          "size" : 1,
                          "hasNextPage" : false,
                          "hasPreviousPage" : false,
                          "startCursor" : "start-cursor",
                          "endCursor" : "end-cursor"
                        },
                        "nodes" : [ {
                          "cursor" : "cursor",
                          "content" : {
                            "id" : 1,
                            "slug" : "test-slug",
                            "author" : {
                              "id" : 1,
                              "handle" : "user_handle",
                              "name" : "User Name",
                              "profileImageUrl" : "https://example.com/profile.jpg"
                            },
                            "content" : "This is a feed item content",
                            "likeCount" : 10,
                            "commentCount" : 5,
                            "bookmarked" : true,
                            "createdAt" : "2026-05-04T12:00:00"
                          }
                        } ]
                      }
                    }
  /media:
    post:
      tags:
      - media
      summary: Upload Media
      description: Upload Media
      operationId: UploadMedia
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadMediaRequest"
            examples:
              UploadMedia:
                value: "{\"mediaType\":\"image/jpeg\",\"fileName\":\"test.jpg\",\"\
                  fileSize\":100}"
      responses:
        "201":
          description: "201"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadMediaResponse"
              examples:
                UploadMedia:
                  value: |-
                    {
                      "mediaId" : 1,
                      "uploadUrl" : "https://example.com/upload",
                      "expiresAt" : "1970-01-01T00:00:00"
                    }
  /posts:
    get:
      tags:
      - post
      summary: Get Posts
      description: Get Posts
      operationId: GetPosts
      parameters:
      - name: first
        in: query
        description: Number of items to return from the beginning of the list
        required: false
        schema:
          type: string
      - name: after
        in: query
        description: "Cursor for pagination, indicating the position after which to\
          \ return items"
        required: false
        schema:
          type: string
      - name: last
        in: query
        description: Number of items to return from the end of the list
        required: false
        schema:
          type: string
      - name: before
        in: query
        description: "Cursor for pagination, indicating the position before which\
          \ to return items"
        required: false
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetPostsResponse"
              examples:
                GetPosts:
                  value: "{\"posts\":{\"pageInfo\":{\"size\":1,\"hasNextPage\":false,\"\
                    hasPreviousPage\":false,\"startCursor\":\"start-cursor\",\"endCursor\"\
                    :\"end-cursor\"},\"nodes\":[{\"cursor\":\"cursor\",\"content\"\
                    :{\"id\":1,\"author\":{\"id\":1,\"name\":\"User\"},\"project\"\
                    :{\"id\":1,\"name\":\"Project\"},\"content\":\"Post Content\"\
                    ,\"createdAt\":\"1970-01-01T00:00:00\"}}]}}"
    post:
      tags:
      - post
      summary: Create Post
      description: Create Post
      operationId: CreatePost
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePostRequest"
            examples:
              CreatePost:
                value: "{\"title\":\"title\",\"type\":\"SHORT\",\"content\":{\"text\"\
                  :\"This is a post content.\",\"json\":\"{\\\"text\\\": \\\"This\
                  \ is a post content.\\\"}\"},\"tags\":[\"java\",\"spring\"],\"projectId\"\
                  :1}"
      responses:
        "201":
          description: "201"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePostResponse"
              examples:
                CreatePost:
                  value: |-
                    {
                      "slug" : "slug"
                    }
  /posts/{postId}:
    delete:
      tags:
      - post
      summary: Delete Post
      description: Delete Post
      operationId: DeletePost
      parameters:
      - name: postId
        in: path
        description: Post ID
        required: true
        schema:
          type: string
      responses:
        "204":
          description: "204"
    patch:
      tags:
      - post
      summary: Update Post
      description: Update Post
      operationId: UpdatePost
      parameters:
      - name: postId
        in: path
        description: Post ID
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePostRequest"
            examples:
              UpdatePost:
                value: "{\"projectId\":1,\"content\":\"This is a post content.\"}"
      responses:
        "204":
          description: "204"
  /posts/{slug}:
    get:
      tags:
      - post
      summary: Get Post By Slug
      description: Get Post By Slug
      operationId: GetPostBySlug
      parameters:
      - name: slug
        in: path
        description: ""
        required: true
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetPostResponse"
              examples:
                GetPostBySlug:
                  value: "{\"id\":1,\"slug\":\"test-slug\",\"author\":{\"id\":1,\"\
                    name\":\"Author Name\"},\"project\":{\"id\":1,\"name\":\"Project\
                    \ Name\"},\"content\":\"Post Content\",\"likeCount\":1,\"commentCount\"\
                    :1,\"bookmarked\":true}"
  /posts/{postId}/bookmarks:
    post:
      tags:
      - bookmark
      summary: Bookmark Post
      description: Bookmark Post
      operationId: BookmarkPost
      parameters:
      - name: postId
        in: path
        description: Post ID
        required: true
        schema:
          type: string
      responses:
        "200":
          description: "200"
    delete:
      tags:
      - bookmark
      summary: Unbookmark Post
      description: Unbookmark Post
      operationId: UnbookmarkPost
      parameters:
      - name: postId
        in: path
        description: Post ID
        required: true
        schema:
          type: string
      responses:
        "204":
          description: "204"
  /posts/{postId}/comments:
    post:
      tags:
      - comment
      summary: Create Comment
      description: Create Comment
      operationId: CreateComment
      parameters:
      - name: postId
        in: path
        description: Post ID
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommentRequest"
            examples:
              CreateComment:
                value: "{\"parentId\":1,\"content\":\"Comment content\"}"
      responses:
        "201":
          description: "201"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCommentResponse"
              examples:
                CreateComment:
                  value: "{\"id\":1}"
  /posts/{postId}/likes:
    put:
      tags:
      - post
      summary: Like Post
      description: Like Post
      operationId: LikePost
      parameters:
      - name: postId
        in: path
        description: Post ID
        required: true
        schema:
          type: string
      responses:
        "204":
          description: "204"
    delete:
      tags:
      - post
      summary: Unlike Post
      description: Unlike Post
      operationId: UnlikePost
      parameters:
      - name: postId
        in: path
        description: Post ID
        required: true
        schema:
          type: string
      responses:
        "204":
          description: "204"
  /posts/{slug}/comments:
    get:
      tags:
      - comment
      summary: Get Post Comments
      description: Get Post Comments
      operationId: GetPostComments
      parameters:
      - name: slug
        in: path
        description: Post Slug
        required: true
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCommentsResponse"
              examples:
                GetPostComments:
                  value: "{\"comments\":[{\"id\":1,\"author\":{\"id\":1,\"handle\"\
                    :\"user-handle\",\"name\":\"User Name\",\"profileImageUrl\":\"\
                    http://example.com/profile.jpg\",\"isPostAuthor\":false},\"content\"\
                    :\"Comment content\",\"isDeleted\":false,\"createdAt\":\"2026-01-01T00:00:00Z\"\
                    ,\"updatedAt\":\"2026-01-01T00:00:00Z\",\"replies\":[{\"id\":2,\"\
                    author\":{\"id\":1,\"handle\":\"user-handle\",\"name\":\"User\
                    \ Name\",\"profileImageUrl\":\"http://example.com/profile.jpg\"\
                    ,\"isPostAuthor\":false},\"content\":\"Reply content\",\"isDeleted\"\
                    :false,\"createdAt\":\"2026-01-01T00:00:00Z\",\"updatedAt\":\"\
                    2026-01-01T00:00:00Z\",\"replies\":[]}]}]}"
  /preferences/me:
    get:
      tags:
      - preferences
      summary: Get User Preferences
      description: Get User Preferences
      operationId: GetUserPreferences
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetUserPreferencesResponse"
              examples:
                GetUserPreferences:
                  value: "{\"theme\":\"dark\"}"
    patch:
      tags:
      - preferences
      summary: Update User Preferences
      description: Update User Preferences
      operationId: UpdateUserPreferences
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserPreferencesRequest"
            examples:
              UpdateUserPreferences:
                value: "{\"theme\":\"dark\"}"
      responses:
        "204":
          description: "204"
  /profiles/me:
    get:
      tags:
      - profile
      summary: Get Authenticated User Profile
      description: Get Authenticated User Profile
      operationId: GetAuthenticatedUser
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetProfileResponse"
              examples:
                GetAuthenticatedUser:
                  value: "{\"userId\":\"1\",\"handle\":\"username\",\"name\":\"name\"\
                    ,\"email\":\"email@example.com\",\"bio\":\"bio\",\"profession\"\
                    :\"profession\",\"profileImageUrl\":\"https://example.com/profile-image.png\"\
                    ,\"isFollowing\":true,\"isOnboarded\":true,\"isAuthenticatedUser\"\
                    :false,\"role\":\"USER\",\"contacts\":null}"
    patch:
      tags:
      - profile
      summary: Update Profile
      description: Update Profile
      operationId: UpdateProfile
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
            examples:
              UpdateProfile:
                value: "{\"name\":\"name\",\"handle\":\"username\",\"profileImageId\"\
                  :1,\"removeProfileImage\":false,\"isOnboarded\":true,\"bio\":\"\
                  bio\",\"profession\":\"profession\",\"contacts\":{\"custom\":\"\
                  https://example.com\",\"linkedin\":\"linkedinUser\",\"github\":\"\
                  githubUser\",\"instagram\":\"instagramUser\",\"twitter\":\"twitterUser\"\
                  }}"
      responses:
        "204":
          description: "204"
  /profiles/{handle}:
    get:
      tags:
      - profile
      summary: Get Profile By Handle
      description: Get Profile By Handle
      operationId: GetProfileByHandle
      parameters:
      - name: handle
        in: path
        description: Handle
        required: true
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetProfileResponse"
              examples:
                GetProfileByHandle:
                  value: "{\"userId\":\"1\",\"handle\":\"username\",\"name\":\"name\"\
                    ,\"email\":\"email@example.com\",\"bio\":\"bio\",\"profession\"\
                    :\"profession\",\"profileImageUrl\":\"https://example.com/profile-image.png\"\
                    ,\"isFollowing\":true,\"isOnboarded\":true,\"isAuthenticatedUser\"\
                    :false,\"role\":\"USER\",\"contacts\":null}"
  /profiles/{handle}/posts/activities:
    get:
      tags:
      - post
      summary: Get Post Activities
      description: Get Post Activities
      operationId: GetPostActivities
      parameters:
      - name: handle
        in: path
        description: User Handle
        required: true
        schema:
          type: string
      - name: year
        in: query
        description: Year of Activities
        required: true
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetPostActivitiesResponse"
              examples:
                GetPostActivities:
                  value: "{\"activities\":[{\"date\":\"2024-01-01\",\"count\":5},{\"\
                    date\":\"2024-01-02\",\"count\":3}]}"
  /projects:
    post:
      tags:
      - project
      summary: Create Project
      description: 새로운 프로젝트를 생성합니다.
      operationId: CreateProject
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
            examples:
              CreateProject:
                value: "{\"handle\":\"project-handle\",\"name\":\"새로운 프로젝트\"}"
      responses:
        "201":
          description: "201"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateProjectResponse"
              examples:
                CreateProject:
                  value: "{\"handle\":\"my-project\"}"
  /projects/{handle}:
    get:
      tags:
      - project
      summary: Get Project By Handle
      description: 핸들로 프로젝트를 조회합니다.
      operationId: GetProjectByHandle
      parameters:
      - name: handle
        in: path
        description: 프로젝트 핸들
        required: true
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetProjectResponse"
              examples:
                GetProjectByHandle:
                  value: "{\"handle\":\"my-project\",\"name\":\"나의 프로젝트\",\"description\"\
                    :\"프로젝트 설명\",\"isPublic\":false,\"teammates\":[{\"handle\":\"\
                    john\",\"name\":\"John Doe\",\"role\":\"ADMIN\"},{\"handle\":\"\
                    jane\",\"name\":\"Jane Doe\",\"role\":\"MEMBER\"}],\"hasMoreTeammates\"\
                    :false,\"role\":\"ADMIN\",\"recentActivities\":[{\"id\":\"1\"\
                    ,\"timestamp\":\"2024-01-01T00:00:00Z\",\"text\":\"활동 내용\"}]}"
  /projects/handles/availability:
    get:
      tags:
      - project
      summary: Get Project Handle Availability
      description: 프로젝트 핸들의 사용 가능 여부를 확인합니다.
      operationId: GetProjectHandleAvailability
      parameters:
      - name: handle
        in: query
        description: 확인할 프로젝트 핸들
        required: true
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetProjectHandleAvailabilityResponse"
              examples:
                GetProjectHandleAvailability:
                  value: "{\"available\":true}"
  /projects/{handle}/posts:
    get:
      tags:
      - post
      summary: Get Posts By Project
      description: Get Posts By Project
      operationId: GetPostsByProject
      parameters:
      - name: handle
        in: path
        description: 프로젝트 핸들
        required: true
        schema:
          type: string
      - name: first
        in: query
        description: Number of items to return from the beginning of the list
        required: false
        schema:
          type: string
      - name: after
        in: query
        description: "Cursor for pagination, indicating the position after which to\
          \ return items"
        required: false
        schema:
          type: string
      - name: last
        in: query
        description: Number of items to return from the end of the list
        required: false
        schema:
          type: string
      - name: before
        in: query
        description: "Cursor for pagination, indicating the position before which\
          \ to return items"
        required: false
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetPostsResponse"
              examples:
                GetPostsByProject:
                  value: "{\"posts\":{\"pageInfo\":{\"size\":1,\"hasNextPage\":false,\"\
                    hasPreviousPage\":false,\"startCursor\":\"start-cursor\",\"endCursor\"\
                    :\"end-cursor\"},\"nodes\":[{\"cursor\":\"cursor\",\"content\"\
                    :{\"id\":1,\"author\":{\"id\":1,\"name\":\"User\"},\"project\"\
                    :{\"id\":1,\"name\":\"Project\"},\"content\":\"Post Content\"\
                    ,\"createdAt\":\"1970-01-01T00:00:00\"}}]}}"
  /projects/{handle}/teammates:
    get:
      tags:
      - project
      summary: Get Project Teammates
      description: 프로젝트의 팀원 목록을 조회합니다.
      operationId: GetProjectTeammates
      parameters:
      - name: handle
        in: path
        description: 프로젝트 핸들
        required: true
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetProjectTeammatesResponse"
              examples:
                GetProjectTeammates:
                  value: "{\"teammates\":[{\"handle\":\"john\",\"name\":\"John Doe\"\
                    ,\"role\":\"ADMIN\"},{\"handle\":\"jane\",\"name\":\"Jane Doe\"\
                    ,\"role\":\"MEMBER\"}]}"
    post:
      tags:
      - project
      summary: Add Teammate
      description: 프로젝트에 팀원을 추가합니다.
      operationId: AddTeammate
      parameters:
      - name: handle
        in: path
        description: 프로젝트 핸들
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddTeammateRequest"
            examples:
              AddTeammate:
                value: "{\"teammateHandle\":\"john-doe\"}"
      responses:
        "201":
          description: "201"
  /search/posts:
    get:
      tags:
      - post
      summary: Search Posts
      description: Search Posts by query string
      operationId: SearchPosts
      parameters:
      - name: query
        in: query
        description: Search query (1-100 characters)
        required: true
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchPostsResponse"
              examples:
                SearchPosts:
                  value: "{\"posts\":[{\"id\":1,\"content\":\"Post Content\"}]}"
  /search/projects:
    get:
      tags:
      - project
      summary: Search Projects
      description: 검색어로 프로젝트를 검색합니다.
      operationId: SearchProjects
      parameters:
      - name: query
        in: query
        description: 프로젝트 검색어
        required: true
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchProjectsResponse"
              examples:
                SearchProjects:
                  value: "{\"projects\":[{\"id\":1,\"handle\":\"spring-boot-project\"\
                    ,\"name\":\"Spring Boot 프로젝트\"},{\"id\":2,\"handle\":\"react-project\"\
                    ,\"name\":\"React 프로젝트\"}]}"
  /search/tags:
    get:
      tags:
      - tag
      summary: Search Tags
      description: 검색어로 태그를 검색합니다.
