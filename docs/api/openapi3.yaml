components:
  schemas:
    UploadMediaResponse:
      title: UploadMediaResponse
      required:
      - expiresAt
      - mediaId
      - uploadUrl
      type: object
      properties:
        uploadUrl:
          type: string
          description: Pre-signed Upload URL
        mediaId:
          type: number
          description: Media ID
        expiresAt:
          type: string
          description: Expiration Time
    CreateContestOccurrenceRequest:
      title: CreateContestOccurrenceRequest
      required:
      - title
      type: object
      properties:
        description:
          type: string
          description: Contest Occurrence Description
          nullable: true
        title:
          type: string
          description: Contest Occurrence Title
    GetJobPostingsResponse:
      title: GetJobPostingsResponse
      type: object
      properties:
        postings:
          required:
          - content
          - hasNext
          - hasPrevious
          type: object
          properties:
            hasPrevious:
