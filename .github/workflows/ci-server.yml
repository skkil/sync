name: ci/server

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v3
        with:
          distribution: "temurin"
          java-version: "25"
      - run: ./scripts/ci/build-server.sh
      - name: Check for formatting issues
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "Formatting required. Please run the formatter locally and commit the changes."
            git status --porcelain
            exit 1
          fi
