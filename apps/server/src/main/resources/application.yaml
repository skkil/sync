spring:
  application:
    name: sync

  config:
    import: optional:file:.env[.properties]

  threads:
    virtual.enabled: true

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml

  session:
    store-type: jdbc
    jdbc:
      initialize-schema: always

  jackson:
    mapper:
      accept-case-insensitive-enums: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID:ID}
            client-secret: ${OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET:SECRET}
            scope:
              - openid
              - profile
              - email

  ai:
    model:
      chat: ${AI_PROVIDER}
    ollama:
      base-url: ${OLLAMA_URL:http://localhost:11434}
      chat:
        options:
          model: ${OLLAMA_MODEL}
          format: json
          temperature: 0

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  cloud:
    aws:
      s3:
        config.enabled: true

app:
  cors.allowed-origins: http://localhost:3000
  frontend-base-url: http://localhost:3000
  oauth2:
    frontend-redirect-uri: http://localhost:3000
  slack:
    webhook-url: ${SLACK_WEBHOOK_URL:}

management:
  observations:
    annotations:
      enabled: true

  logging:
    export:
      otlp:
        enabled: ${ENABLE_TELEMETRY:false}

  tracing:
    export:
      enabled: ${ENABLE_TELEMETRY:false}

  otlp:
    metrics:
      export:
        enabled: ${ENABLE_TELEMETRY:false}

  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - metrics
          - prometheus

server:
  servlet:
    session:
      cookie:
        path: /
        name: session
        http-only: true
        secure: true
        same-site: lax
