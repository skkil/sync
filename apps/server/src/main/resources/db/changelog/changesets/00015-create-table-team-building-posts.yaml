databaseChangeLog:
  - changeSet:
      id: 00015-create-table-team-building-posts
      author: hyoungjoojin
      preConditions:
        - not:
            tableExists:
              tableName: team_building_posts
      changes:
        - createTable:
            tableName: team_building_posts
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: project_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: content
                  type: TEXT
        - addForeignKeyConstraint:
            baseTableName: team_building_posts
            baseColumnNames: project_id
            referencedTableName: projects
            referencedColumnNames: id
            constraintName: fk_team_building_posts_project_id
            onDelete: CASCADE
