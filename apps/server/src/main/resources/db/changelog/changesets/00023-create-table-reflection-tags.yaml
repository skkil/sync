databaseChangeLog:
  - changeSet:
      id: 00022-create-table-reflection-tags
      author: hyoungjoojin
      preConditions:
        - and:
            - tableExists:
                tableName: reflections
            - tableExists:
                tableName: tags
            - not:
                tableExists:
                  tableName: reflection_tags
      changes:
        - createTable:
            tableName: reflection_tags
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: reflection_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: tag_id
                  type: BIGINT
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: reflection_tags
            baseColumnNames: reflection_id
            referencedTableName: reflections
            referencedColumnNames: id
            constraintName: fk_reflection_tags_reflection_id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: reflection_tags
            baseColumnNames: tag_id
            referencedTableName: tags
            referencedColumnNames: id
            constraintName: fk_reflection_tags_tag_id
            onDelete: CASCADE
        - addUniqueConstraint:
            tableName: reflection_tags
            columnNames: reflection_id, tag_id
            constraintName: uq_reflection_tags_reflection_id_tag_id
