databaseChangeLog:
  - changeSet:
      id: 00008-create-table-labs
      author: jieunseo
      preConditions:
        - not:
            tableExists:
              tableName: labs
      changes:
        - createTable:
            tableName: labs
            columns:
              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    primaryKey: true
              - column:
                  name: professor_name
                  type: VARCHAR(255)
              - column:
                  name: school_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: research_area
                  type: TEXT
              - column:
                  name: detailed_research_field
                  type: TEXT
        - addForeignKeyConstraint:
            baseTableName: labs
            baseColumnNames: id
            referencedTableName: providers
            referencedColumnNames: id
            constraintName: fk_labs_providers
            onDelete: CASCADE
