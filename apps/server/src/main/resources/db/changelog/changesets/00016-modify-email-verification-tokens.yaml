databaseChangeLog:
  - changeSet:
      id: 00016-modify-email-verification-tokens
      author: copilot
      changes:
        - addColumn:
            tableName: email_verification_tokens
            columns:
              - column:
                  name: email
                  type: VARCHAR(255)
