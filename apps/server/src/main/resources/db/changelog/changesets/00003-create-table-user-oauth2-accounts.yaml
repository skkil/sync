databaseChangeLog:
  - changeSet:
      id: 00003-create-table-user-oauth2-accounts
      author: hyoungjoojin
      preConditions:
        - not:
            tableExists:
              tableName: user_oauth2_accounts
      changes:
        - createTable:
            tableName: user_oauth2_accounts
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: oauth_provider
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: oauth_provider_user_id
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: user_oauth2_accounts
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_user_oauth2_accounts_user_id
            onDelete: CASCADE
        - addUniqueConstraint:
            tableName: user_oauth2_accounts
            columnNames: user_id, oauth_provider
            constraintName: uq_user_oauth2_accounts_user_id_oauth_provider
