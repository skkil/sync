databaseChangeLog:
  - changeSet:
      id: 00025-create-table-teammates
      author: hyoungjoojin
      preConditions:
        - and:
            - tableExists:
                tableName: projects
            - tableExists:
                tableName: users
            - not:
                tableExists:
                  tableName: teammates
      changes:
        - createTable:
            tableName: teammates
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: project_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: is_owner
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: teammates
            baseColumnNames: project_id
            referencedTableName: projects
            referencedColumnNames: id
            constraintName: fk_teammates_projects
        - addForeignKeyConstraint:
            baseTableName: teammates
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_teammates_users
        - addUniqueConstraint:
            tableName: teammates
            columnNames: project_id, user_id
            constraintName: uq_teammates_project_user
