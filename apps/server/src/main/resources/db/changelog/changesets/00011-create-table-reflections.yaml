databaseChangeLog:
  - changeSet:
      id: 00011-create-table-reflections
      author: hyoungjoojin
      preConditions:
        - not:
            tableExists:
              tableName: reflections
      changes:
        - createTable:
            tableName: reflections
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: experience_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: content
                  type: TEXT
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: reflections
            baseColumnNames: experience_id
            referencedTableName: experiences
            referencedColumnNames: id
            constraintName: fk_reflections_experience_id
