databaseChangeLog:
  - changeSet:
      id: 00011-create-table-reflections
      author: hyoungjoojin
      preConditions:
        - and:
            - tableExists:
                tableName: users
            - tableExists:
                tableName: projects
            - not:
                tableExists:
                  tableName: reflections
      changes:
        - createTable:
            tableName: reflections
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: slug
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: author_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: project_id
                  type: BIGINT
              - column:
                  name: title
                  type: VARCHAR(255)
              - column:
                  name: content
                  type: TEXT
        - addForeignKeyConstraint:
            baseTableName: reflections
            baseColumnNames: author_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_reflections_author_id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: reflections
            baseColumnNames: project_id
            referencedTableName: projects
            referencedColumnNames: id
            constraintName: fk_reflections_project_id
            onDelete: SET NULL
