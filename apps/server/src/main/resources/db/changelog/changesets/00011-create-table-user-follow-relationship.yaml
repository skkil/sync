databaseChangeLog:
  - changeSet:
      id: 00006-create-table-user-follow-relationship
      author: hyoungjoojin
      preConditions:
        - and:
            - tableExists:
                tableName: users
            - not:
                tableExists:
                  tableName: user_follow_relationships
      changes:
        - createTable:
            tableName: user_follow_relationships
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: follower_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: followee_id
                  type: BIGINT
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: user_follow_relationships
            baseColumnNames: follower_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_user_follow_relationships_follower_id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: user_follow_relationships
            baseColumnNames: followee_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_user_follow_relationships_followee_id
            onDelete: CASCADE
        - addUniqueConstraint:
            tableName: user_follow_relationships
            columnNames: follower_id, followee_id
            constraintName: uq_user_follow_relationships_follower_followee
