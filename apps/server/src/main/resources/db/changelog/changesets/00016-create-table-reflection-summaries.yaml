databaseChangeLog:
  - changeSet:
      id: 00016-create-table-reflection-summaries
      author: hyoungjoojin
      preConditions:
        - and:
            - tableExists:
                tableName: reflections
            - not:
                tableExists:
                  tableName: reflection_summaries
      changes:
        - createTable:
            tableName: reflection_summaries
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: summary
                  type: TEXT
        - addForeignKeyConstraint:
            baseTableName: reflection_summaries
            baseColumnNames: id
            referencedTableName: reflections
            referencedColumnNames: id
            constraintName: fk_reflection_summaries_reflection_id
            onDelete: CASCADE
