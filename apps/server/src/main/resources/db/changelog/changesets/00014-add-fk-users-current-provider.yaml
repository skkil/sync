databaseChangeLog:
  - changeSet:
      id: 000014-add-fk-users-current-provider
      author: jieunseo
      preConditions:
        - not:
            foreignKeyConstraintExists:
              foreignKeyName: fk_users_current_provider
      changes:
        - addForeignKeyConstraint:
            baseTableName: users
            baseColumnNames: current_provider_id
            referencedTableName: providers
            referencedColumnNames: id
            constraintName: fk_users_current_provider

        - createIndex:
            tableName: users
            indexName: idx_users_current_provider_id
            columns:
              - column:
                  name: current_provider_id