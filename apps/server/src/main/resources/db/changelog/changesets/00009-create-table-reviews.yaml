databaseChangeLog:
  - changeSet:
      id: 00009-create-table-reviews
      author: jieunseo
      preConditions:
        - not:
            tableExists:
              tableName: reviews
      changes:
        - createTable:
            tableName: reviews
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: review_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: reviewer_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: provider_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: text_review
                  type: TEXT
        # Foreign keys
        - addForeignKeyConstraint:
            baseTableName: reviews
            baseColumnNames: reviewer_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_reviews_reviewer_id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: reviews
            baseColumnNames: provider_id
            referencedTableName: providers
            referencedColumnNames: id
            constraintName: fk_reviews_provider_id
            onDelete: CASCADE
        # Index
        - createIndex:
            indexName: idx_reviews_provider_id
            tableName: reviews
            columns:
              - column:
                  name: provider_id
        - createIndex:
            indexName: idx_reviews_reviewer_id
            tableName: reviews
            columns:
              - column:
                  name: reviewer_id

  - changeSet:
      id: 00009-create-table-lab-reviews
      author: jieunseo
      preConditions:
        - not:
            tableExists:
              tableName: lab_reviews
      changes:
        - createTable:
            tableName: lab_reviews
            columns:
              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    primaryKey: true
              - column:
                  name: review_details
                  type: JSONB
        - addForeignKeyConstraint:
            baseTableName: lab_reviews
            baseColumnNames: id
            referencedTableName: reviews
            referencedColumnNames: id
            constraintName: fk_lab_reviews_reviews
            onDelete: CASCADE

  - changeSet:
      id: 00009-create-table-school-reviews
      author: jieunseo
      preConditions:
        - not:
            tableExists:
              tableName: school_reviews
      changes:
        - createTable:
            tableName: school_reviews
            columns:
              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    primaryKey: true
              - column:
                  name: review_details
                  type: JSONB
        - addForeignKeyConstraint:
            baseTableName: school_reviews
            baseColumnNames: id
            referencedTableName: reviews
            referencedColumnNames: id
            constraintName: fk_school_reviews_reviews
            onDelete: CASCADE

  - changeSet:
      id: 00009-create-table-company-reviews
      author: jieunseo
      preConditions:
        - not:
            tableExists:
              tableName: company_reviews
      changes:
        - createTable:
            tableName: company_reviews
            columns:
              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    primaryKey: true
              - column:
                  name: review_details
                  type: JSONB
        - addForeignKeyConstraint:
            baseTableName: company_reviews
            baseColumnNames: id
            referencedTableName: reviews
            referencedColumnNames: id
            constraintName: fk_company_reviews_reviews
            onDelete: CASCADE
