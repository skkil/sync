databaseChangeLog:
  - changeSet:
      id: 00004-create-table-experiences
      author: hyoungjoojin
      preConditions:
        - not:
            tableExists:
              tableName: experiences
      changes:
        - createTable:
            tableName: experiences
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: experience_type
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: provider_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: start_date
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: end_date
                  type: TIMESTAMP
        - addForeignKeyConstraint:
            baseTableName: experiences
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_experiences_users
        - addForeignKeyConstraint:
            baseTableName: experiences
            baseColumnNames: provider_id
            referencedTableName: providers
            referencedColumnNames: id
            constraintName: fk_experiences_providers
