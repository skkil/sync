databaseChangeLog:
  - changeSet:
      id: 00004-create-table-media-files
      author: hyoungjoojin
      preConditions:
        - not:
            tableExists:
              tableName: media_files
      changes:
        - createTable:
            tableName: media_files
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: uploader_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: media_context
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: media_type
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: bucket
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: key
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: filename
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: size
                  type: BIGINT
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: media_files
            baseColumnNames: uploader_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_media_files_uploader_id
            onDelete: CASCADE
