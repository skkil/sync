databaseChangeLog:
  - changeSet:
      id: 00016-create-table-job-applications
      author: hyoungjoojin
      preConditions:
        - not:
            tableExists:
              tableName: job_applications
      changes:
        - createTable:
            tableName: job_applications
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: job_posting_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: applicant_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: notes
                  type: TEXT
        - addForeignKeyConstraint:
            constraintName: fk_job_applications_job_postings
            baseTableName: job_applications
            baseColumnNames: job_posting_id
            referencedTableName: job_postings
            referencedColumnNames: id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            constraintName: fk_job_applications_users
            baseTableName: job_applications
            baseColumnNames: applicant_id
            referencedTableName: users
            referencedColumnNames: id
            onDelete: CASCADE
        - addUniqueConstraint:
            constraintName: uk_job_applications_job_posting_applicant
            tableName: job_applications
            columnNames: job_posting_id, applicant_id
