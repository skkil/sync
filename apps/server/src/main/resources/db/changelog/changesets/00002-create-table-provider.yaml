databaseChangeLog:
  - changeSet:
      id: 00002-create-table-provider
      author: hyoungjoojin
      preConditions:
        - not:
            tableExists:
              tableName: providers
      changes:
        - createTable:
            tableName: providers
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: provider_type
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: created_by
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: verified_by
                  type: BIGINT
        - addForeignKeyConstraint:
            baseTableName: providers
            baseColumnNames: created_by
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_providers_created_by
        - addForeignKeyConstraint:
            baseTableName: providers
            baseColumnNames: verified_by
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_providers_verified_by
