databaseChangeLog:
  - changeSet:
      id: 00021-create-table-reflection-media-files
      author: kkuiks
      preConditions:
        - and:
            - tableExists:
                tableName: reflections
            - tableExists:
                tableName: media_files
            - not:
                tableExists:
                  tableName: reflection_media_files
      changes:
        - createTable:
            tableName: reflection_media_files
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: reflection_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: media_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: sort_order
                  type: INT
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            constraintName: fk_reflection_media_files_reflections
            baseTableName: reflection_media_files
            baseColumnNames: reflection_id
            referencedTableName: reflections
            referencedColumnNames: id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            constraintName: fk_reflection_media_files_media
            baseTableName: reflection_media_files
            baseColumnNames: media_id
            referencedTableName: media_files
            referencedColumnNames: id
            onDelete: CASCADE
        - addUniqueConstraint:
            constraintName: uk_reflection_media_files_reflection_media
            tableName: reflection_media_files
            columnNames: reflection_id, media_id
        - addUniqueConstraint:
            constraintName: uk_reflection_media_files_reflection_order
            tableName: reflection_media_files
            columnNames: reflection_id, sort_order