databaseChangeLog:
  - changeSet:
      id: 00013-create-table-maintainers
      author: hyoungjoojin
      preConditions:
        - not:
            tableExists:
              tableName: maintainers
      changes:
        - createTable:
            tableName: maintainers
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: provider_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: maintainers
            baseColumnNames: provider_id
            referencedTableName: providers
            referencedColumnNames: id
            constraintName: fk_maintainers_provider_id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: maintainers
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_maintainers_user_id
            onDelete: CASCADE
        - addUniqueConstraint:
            tableName: maintainers
            columnNames: provider_id, user_id
            constraintName: uk_maintainers_provider_user
