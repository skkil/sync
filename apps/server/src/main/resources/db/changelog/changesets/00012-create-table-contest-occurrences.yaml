databaseChangeLog:
  - changeSet:
      id: 00012-create-table-contest-occurrences
      author: hyoungjoojin
      preConditions:
        - not:
            tableExists:
              tableName: contest_occurrences
      changes:
        - createTable:
            tableName: contest_occurrences
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: contest_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: occurrence_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
        - addForeignKeyConstraint:
            baseTableName: contest_occurrences
            baseColumnNames: contest_id
            referencedTableName: contests
            referencedColumnNames: id
            constraintName: fk_contest_occurrences_contest_id
            onDelete: CASCADE
