<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
  </head>

  <body style="margin: 0; padding: 0; background: #f8fafc; color: #111827">
    <div
      style="
        max-width: 640px;
        margin: 0 auto;
        padding: 32px 20px;
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      "
    >
      <h2 style="margin: 0 0 8px 0; font-size: 24px">sync 뉴스레터</h2>
      <p style="margin: 0 0 24px 0; color: #4b5563">
        <span th:text="${recipientName}"></span>님을 위한 최신 포스트입니다.
      </p>

      <div
        th:each="post : ${posts}"
        style="
          margin-bottom: 16px;
          padding: 20px;
          background: #ffffff;
          border: 1px solid #e5e7eb;
          border-radius: 8px;
        "
      >
        <p
          style="margin: 0 0 8px 0; color: #6b7280; font-size: 13px"
          th:text="|${post.authorName} · ${#temporals.format(post.createdAt, 'yyyy.MM.dd')}|"
        ></p>
        <h3 style="margin: 0 0 10px 0; font-size: 18px; line-height: 1.4">
          <a
            th:href="${post.url}"
            th:text="${post.title}"
            style="color: #111827; text-decoration: none"
          ></a>
        </h3>
        <p
          style="margin: 0 0 14px 0; color: #374151; line-height: 1.6"
          th:text="${post.excerpt}"
        ></p>
        <a
          th:href="${post.url}"
          style="color: #4f46e5; font-weight: 600; text-decoration: none"
          >포스트 읽기</a
        >
      </div>
    </div>
  </body>
</html>
