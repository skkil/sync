<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
  </head>

  <body>
    <h2>이메일 인증</h2>
    <p>아래 인증 코드를 입력하여 회원가입을 완료해주세요.</p>

    <div
      style="
        margin: 20px 0;
        padding: 20px;
        background: #f5f5f5;
        border-radius: 6px;
        text-align: center;
      "
    >
      <p style="font-size: 14px; color: #6b7280; margin: 0 0 10px 0">
        인증 코드
      </p>
      <p
        style="
          font-size: 36px;
          font-weight: bold;
          color: #4f46e5;
          margin: 0;
          letter-spacing: 4px;
        "
        th:text="${token}"
      ></p>
      <p style="font-size: 12px; color: #9ca3af; margin: 10px 0 0 0">
        이 코드는 <span th:text="${expirationMinutes}"></span>분 동안
        유효합니다.
      </p>
    </div>

    <p style="color: #9ca3af; font-size: 12px">
      이 요청을 하지 않으셨다면 본 이메일을 무시해주세요.
    </p>
  </body>
</html>
